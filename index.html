<!doctype html>
<html lang="nl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Interactief kleurenrad</title>
  <style>
    :root {
      --green: #72df00;
      --orange: #ff8a45;
      --blue: #4c66f0;
      --rim: #e9e9e9;
      --rim-dark: #9a9a9a;
      --text: #ffffff;
      --button-shadow: 0 10px 24px rgba(0,0,0,.18);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100svh;
      display: grid;
      place-items: center;
      background: #f7f7f7;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #1f1f1f;
    }

    .app {
      width: min(1120px, 96vw);
      display: grid;
      grid-template-columns: minmax(300px, 760px) 180px;
      gap: clamp(20px, 4vw, 54px);
      align-items: center;
      padding: 24px;
    }

    .wheel-wrap {
      position: relative;
      width: min(760px, 86vw);
      aspect-ratio: 1;
      margin-inline: auto;
    }

    .wheel {
      width: 100%;
      height: 100%;
      display: block;
      filter: drop-shadow(0 16px 30px rgba(0,0,0,.18));
      transform: rotate(0deg);
      transition: transform 3.8s cubic-bezier(.12,.72,.08,1);
      transform-origin: 50% 50%;
    }

    .slice {
      transition: opacity .55s ease, filter .55s ease;
      opacity: 1;
    }

    .slice-label {
      fill: var(--text);
      font-size: 42px;
      font-weight: 800;
      letter-spacing: .5px;
      paint-order: stroke;
      stroke: rgba(0,0,0,.06);
      stroke-width: 2px;
      transition: opacity .55s ease;
      pointer-events: none;
    }

    .wheel.settled .slice:not(.active),
    .wheel.settled .slice-label:not(.active-label) {
      opacity: .28;
    }

    .wheel.settled .slice.active {
      opacity: 1;
      filter: drop-shadow(0 0 18px rgba(255,255,255,.9)) drop-shadow(0 0 22px rgba(0,0,0,.22));
    }

    .wheel.settled .slice-label.active-label {
      opacity: 1;
    }

    .pointer {
      position: absolute;
      top: -8px;
      left: 50%;
      width: 0;
      height: 0;
      transform: translateX(-50%);
      border-left: 26px solid transparent;
      border-right: 26px solid transparent;
      border-top: 0;
      border-bottom: 48px solid #222;
      filter: drop-shadow(0 5px 4px rgba(0,0,0,.28));
      z-index: 3;
    }

    .hub {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 118px;
      height: 118px;
      transform: translate(-50%, -50%);
      border-radius: 999px;
      background: radial-gradient(circle at 62% 35%, #ff8580 0 16%, #e62620 38%, #a90808 100%);
      box-shadow: 0 8px 18px rgba(0,0,0,.28);
      z-index: 2;
      display: grid;
      place-items: center;
    }

    .hub::after {
      content: "★";
      color: #ffdc45;
      font-size: 58px;
      line-height: 1;
      text-shadow: 0 1px 0 rgba(0,0,0,.12);
    }

    .controls {
      display: grid;
      gap: 16px;
      justify-items: stretch;
    }

    .controls button {
      border: 0;
      border-radius: 22px;
      padding: 20px 22px;
      color: #fff;
      font-size: 1.1rem;
      font-weight: 800;
      cursor: pointer;
      box-shadow: var(--button-shadow);
      transform: translateY(0);
      transition: transform .15s ease, filter .15s ease, opacity .15s ease;
    }

    .controls button:hover {
      transform: translateY(-2px);
      filter: brightness(1.04);
    }

    .controls button:active {
      transform: translateY(1px);
    }

    .controls button:disabled {
      cursor: wait;
      opacity: .72;
      transform: none;
    }

    .btn-green { background: var(--green); color: #174800; }
    .btn-orange { background: var(--orange); }
    .btn-blue { background: var(--blue); }

    .status {
      margin-top: 6px;
      font-size: .95rem;
      color: #555;
      text-align: center;
      min-height: 1.4em;
    }

    @media (max-width: 820px) {
      .app {
        grid-template-columns: 1fr;
        gap: 22px;
      }

      .controls {
        grid-template-columns: repeat(3, 1fr);
      }

      .controls button {
        padding: 16px 10px;
        border-radius: 18px;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="wheel-wrap" aria-label="Interactief kleurenrad">
      <div class="pointer" aria-hidden="true"></div>

      <svg id="wheel" class="wheel" viewBox="0 0 600 600" role="img" aria-labelledby="wheelTitle">
        <title id="wheelTitle">Kleurenrad met groen, blauw en oranje</title>

        <circle cx="300" cy="300" r="294" fill="var(--rim-dark)" />
        <circle cx="300" cy="300" r="286" fill="var(--rim)" />

        <g id="rotatingParts">
          <!-- De sectoren zijn zo geplaatst dat groen standaard exact bovenaan ligt. -->
          <path class="slice slice-green" data-color="green"
                d="M300 300 L52.3 157 A286 286 0 0 1 547.7 157 Z"
                fill="var(--green)" />
          <path class="slice slice-blue" data-color="blue"
                d="M300 300 L547.7 157 A286 286 0 0 1 300 586 Z"
                fill="var(--blue)" />
          <path class="slice slice-orange" data-color="orange"
                d="M300 300 L300 586 A286 286 0 0 1 52.3 157 Z"
                fill="var(--orange)" />

          <path d="M300 300 L52.3 157 M300 300 L547.7 157 M300 300 L300 586"
                stroke="#fff" stroke-width="24" stroke-linecap="round" fill="none" />

          <text class="slice-label label-green" data-color="green"
                x="300" y="150" text-anchor="middle" dominant-baseline="middle">groen</text>
          <text class="slice-label label-blue" data-color="blue"
                x="430" y="390" text-anchor="middle" dominant-baseline="middle"
                transform="rotate(-60 430 390)">blauw</text>
          <text class="slice-label label-orange" data-color="orange"
                x="170" y="390" text-anchor="middle" dominant-baseline="middle"
                transform="rotate(60 170 390)">oranje</text>
        </g>
      </svg>

      <div class="hub" aria-hidden="true"></div>
    </section>

    <aside>
      <div class="controls" aria-label="Kies een kleur">
        <button class="btn-green" data-target="green">Groen</button>
        <button class="btn-orange" data-target="orange">Oranje</button>
        <button class="btn-blue" data-target="blue">Blauw</button>
      </div>
      <p id="status" class="status" aria-live="polite"></p>
    </aside>
  </main>

  <script>
    const wheel = document.querySelector("#wheel");
    const buttons = document.querySelectorAll("button[data-target]");
    const status = document.querySelector("#status");

    // Hoek van het midden van elk kleurvak in de startpositie.
    // Bovenaan is -90 graden. Daarom staat groen op 0 graden extra rotatie.
    const targetRotation = {
      green: 0,
      blue: -120,
      orange: 120
    };

    const label = {
      green: "groen",
      blue: "blauw",
      orange: "oranje"
    };

    let currentRotation = 0;
    let busy = false;

    function setActive(color) {
      document.querySelectorAll(".slice").forEach(part => {
        part.classList.toggle("active", part.dataset.color === color);
      });

      document.querySelectorAll(".slice-label").forEach(text => {
        text.classList.toggle("active-label", text.dataset.color === color);
      });

      wheel.classList.add("settled");
      status.textContent = `Het rad staat op ${label[color]}.`;
    }

    function spinTo(color) {
      if (busy) return;

      busy = true;
      wheel.classList.remove("settled");
      status.textContent = "Het rad draait…";
      buttons.forEach(button => button.disabled = true);

      const finalBase = targetRotation[color];

      // Eerst meerdere volledige rondes. Daarna exact landen op het midden van het gekozen vak.
      const fullTurns = 4 + Math.floor(Math.random() * 2);
      const normalizedCurrent = ((currentRotation % 360) + 360) % 360;
      const normalizedTarget = ((finalBase % 360) + 360) % 360;

      let delta = normalizedTarget - normalizedCurrent;
      if (delta < 0) delta += 360;

      currentRotation += fullTurns * 360 + delta;
      wheel.style.transform = `rotate(${currentRotation}deg)`;

      window.setTimeout(() => {
        setActive(color);
        buttons.forEach(button => button.disabled = false);
        busy = false;
      }, 3900);
    }

    buttons.forEach(button => {
      button.addEventListener("click", () => spinTo(button.dataset.target));
    });

    setActive("green");
  </script>
</body>
</html>
