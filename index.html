<!doctype html>
<html lang="nl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Interactief rad</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .app {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 28px;
      flex-wrap: wrap;
    }

    .wheel-wrap {
      position: relative;
      width: min(78vw, 560px);
      aspect-ratio: 1 / 1;
    }

    .wheel-shell {
      position: relative;
      width: 100%;
      height: 100%;
      border-radius: 50%;
      overflow: hidden;
      background: #e8e8e8;
      box-shadow:
        0 14px 30px rgba(0, 0, 0, 0.12),
        inset 0 0 0 8px #d8d8d8;
    }

    .wheel-rotator {
      position: absolute;
      inset: 0;
      transition: transform 4.4s cubic-bezier(0.16, 0.84, 0.28, 1);
      will-change: transform;
    }

    .wheel-rotator img {
      width: 100%;
      height: 100%;
      display: block;
      user-select: none;
      -webkit-user-drag: none;
      pointer-events: none;
    }

    /* Deze laag maakt het gekozen bovenste vak zichtbaar en dimt de andere twee.
       De transparante sector is expres net iets breder dan 120 graden,
       zodat je geen klein stukje van een ander kleurvak ziet. */
    .focus-mask {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.35s ease;
      background:
        conic-gradient(
          from -64deg at 50% 50%,
          rgba(255, 255, 255, 0.03) 0deg 128deg,
          rgba(255, 255, 255, 0.50) 128deg 360deg
        );
      z-index: 3;
    }

    /* Extra glimmer bovenaan op het gekozen vak */
    .top-glimmer {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.35s ease;
      z-index: 4;
      clip-path: polygon(50% 50%, 7% 27%, 50% 2%, 93% 27%);
      background:
        radial-gradient(circle at 50% 10%, rgba(255,255,255,0.95) 0%, rgba(255,255,255,0.55) 18%, rgba(255,255,255,0) 36%),
        linear-gradient(to bottom, rgba(255,255,255,0.42), rgba(255,255,255,0) 45%);
      filter: blur(1.3px);
      mix-blend-mode: screen;
    }

    /* Extra subtiele highlight over het hele bovenste vlak */
    .top-sheen {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.35s ease;
      z-index: 4;
      background:
        radial-gradient(circle at 50% 22%, rgba(255,255,255,0.25), rgba(255,255,255,0) 28%);
    }

    .wheel-shell.stopped .focus-mask,
    .wheel-shell.stopped .top-glimmer,
    .wheel-shell.stopped .top-sheen {
      opacity: 1;
    }

    .hub {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 92px;
      height: 92px;
      transform: translate(-50%, -50%);
      border-radius: 50%;
      z-index: 5;
      pointer-events: none;
      background:
        radial-gradient(circle at 50% 72%, rgba(255,255,255,0.9), rgba(255,255,255,0) 24%),
        radial-gradient(circle at 35% 30%, #ff7676 0%, #f43636 38%, #bb1212 70%, #850707 100%);
      box-shadow:
        inset 0 5px 8px rgba(255,255,255,0.22),
        inset 0 -6px 8px rgba(0,0,0,0.18),
        0 6px 16px rgba(0,0,0,0.22);
      display: grid;
      place-items: center;
    }

    .hub::before {
      content: "★";
      color: #ffd54d;
      font-size: 42px;
      line-height: 1;
      text-shadow: 0 2px 0 rgba(0,0,0,0.12);
    }

    .controls {
      display: flex;
      flex-direction: column;
      gap: 14px;
      position: relative;
      z-index: 20; /* altijd boven alle rad-lagen */
    }

    .spin-btn {
      min-width: 150px;
      border: none;
      border-radius: 16px;
      padding: 16px 20px;
      font-size: 20px;
      font-weight: 700;
      color: white;
      cursor: pointer;
      box-shadow: 0 8px 18px rgba(0,0,0,0.14);
      transition: transform 0.15s ease, opacity 0.15s ease, box-shadow 0.15s ease;
    }

    .spin-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(0,0,0,0.18);
    }

    .spin-btn:active {
      transform: translateY(0);
    }

    .spin-btn:disabled {
      opacity: 0.65;
      cursor: not-allowed;
    }

    .btn-green {
      background: #65c913;
    }

    .btn-blue {
      background: #4f6fe8;
    }

    .btn-orange {
      background: #f28a46;
    }

    @media (max-width: 860px) {
      .app {
        flex-direction: column;
      }

      .controls {
        flex-direction: row;
        flex-wrap: wrap;
        justify-content: center;
      }

      .spin-btn {
        min-width: 130px;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="wheel-wrap">
      <div class="wheel-shell" id="wheelShell">
        <div class="wheel-rotator" id="wheelRotator">
          <img src="assets/rad.png" alt="Rad" />
        </div>

        <div class="focus-mask"></div>
        <div class="top-glimmer"></div>
        <div class="top-sheen"></div>
        <div class="hub"></div>
      </div>
    </div>

    <div class="controls">
      <button class="spin-btn btn-green" data-target="green">cijfer</button>
      <button class="spin-btn btn-blue" data-target="blue">letter</button>
      <button class="spin-btn btn-orange" data-target="orange">woord</button>
    </div>
  </div>

  <script>
    const wheelShell = document.getElementById("wheelShell");
    const wheelRotator = document.getElementById("wheelRotator");
    const buttons = document.querySelectorAll(".spin-btn");

    let currentRotation = 0;
    let spinning = false;

    /* Uitgangspositie van rad.png:
       groen staat al bovenaan.
       oranje moet naar boven met +120 graden.
       blauw moet naar boven met +240 graden.
    */
    const targetAngles = {
      green: 0,
      orange: 120,
      blue: 240
    };

    function normalize(deg) {
      return ((deg % 360) + 360) % 360;
    }

    function setButtonsDisabled(disabled) {
      buttons.forEach(btn => btn.disabled = disabled);
    }

    function spinTo(targetColor) {
      if (spinning) return;

      spinning = true;
      setButtonsDisabled(true);
      wheelShell.classList.remove("stopped");

      const currentNormalized = normalize(currentRotation);
      const targetAngle = targetAngles[targetColor];
      const delta = normalize(targetAngle - currentNormalized);

      const extraTurns = (4 + Math.floor(Math.random() * 2)) * 360;
      const finalRotation = currentRotation + extraTurns + delta;

      wheelRotator.style.transform = `rotate(${finalRotation}deg)`;
      currentRotation = finalRotation;

      const finish = () => {
        wheelRotator.removeEventListener("transitionend", finish);
        spinning = false;
        setButtonsDisabled(false);
        wheelShell.classList.add("stopped");
      };

      wheelRotator.addEventListener("transitionend", finish, { once: true });
    }

    buttons.forEach(button => {
      button.addEventListener("click", () => {
        spinTo(button.dataset.target);
      });
    });

    /* Start direct met focus op het bovenste groene vak */
    window.addEventListener("load", () => {
      wheelShell.classList.add("stopped");
    });
  </script>
</body>
</html>
