<!doctype html>
<html lang="nl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Interactief rad</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .app {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 28px;
      flex-wrap: wrap;
    }

    .wheel-wrap {
      position: relative;
      width: min(78vw, 560px);
      aspect-ratio: 1 / 1;
    }

    .wheel-shell {
      position: relative;
      width: 100%;
      height: 100%;
      border-radius: 50%;
      overflow: hidden;
      background: #e8e8e8;
      box-shadow:
        0 14px 30px rgba(0, 0, 0, 0.12),
        inset 0 0 0 8px #d8d8d8;
    }

    .wheel-rotator {
      position: absolute;
      inset: 0;
      transition: transform 4.4s cubic-bezier(0.16, 0.84, 0.28, 1);
      will-change: transform;
    }

    .wheel-rotator img {
      width: 100%;
      height: 100%;
      display: block;
      user-select: none;
      -webkit-user-drag: none;
      pointer-events: none;
    }

    .sparkle-zone {
      position: absolute;
      inset: 0;
      z-index: 4;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.3s ease;
      clip-path: polygon(50% 50%, 8% 27%, 50% 3%, 92% 27%);
    }

    .wheel-shell.stopped .sparkle-zone {
      opacity: 1;
    }

    .sparkle {
      position: absolute;
      color: #fff7b8;
      text-shadow:
        0 0 6px rgba(255, 255, 255, 0.95),
        0 0 14px rgba(255, 245, 170, 0.9);
      transform-origin: center;
      animation: twinkle 1.8s infinite ease-in-out;
    }

    .sparkle.s1 {
      left: 48%;
      top: 7%;
      font-size: 30px;
      animation-delay: 0s;
    }

    .sparkle.s2 {
      left: 33%;
      top: 16%;
      font-size: 18px;
      animation-delay: 0.25s;
    }

    .sparkle.s3 {
      left: 63%;
      top: 18%;
      font-size: 20px;
      animation-delay: 0.5s;
    }

    .sparkle.s4 {
      left: 24%;
      top: 25%;
      font-size: 14px;
      animation-delay: 0.8s;
    }

    .sparkle.s5 {
      left: 71%;
      top: 24%;
      font-size: 16px;
      animation-delay: 1.1s;
    }

    .sparkle.s6 {
      left: 43%;
      top: 22%;
      font-size: 16px;
      animation-delay: 1.35s;
    }

    .sparkle.s7 {
      left: 56%;
      top: 27%;
      font-size: 14px;
      animation-delay: 1.55s;
    }

    .spark-dot {
      position: absolute;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: rgba(255, 250, 190, 0.95);
      box-shadow:
        0 0 8px rgba(255, 255, 255, 0.95),
        0 0 18px rgba(255, 245, 170, 0.85);
      animation: pulseDot 1.7s infinite ease-in-out;
    }

    .spark-dot.d1 {
      left: 40%;
      top: 14%;
      animation-delay: 0.15s;
    }

    .spark-dot.d2 {
      left: 60%;
      top: 13%;
      animation-delay: 0.65s;
    }

    .spark-dot.d3 {
      left: 52%;
      top: 20%;
      animation-delay: 1.05s;
    }

    @keyframes twinkle {
      0%, 100% {
        opacity: 0.2;
        transform: scale(0.6) rotate(0deg);
      }

      50% {
        opacity: 1;
        transform: scale(1.18) rotate(18deg);
      }
    }

    @keyframes pulseDot {
      0%, 100% {
        opacity: 0.15;
        transform: scale(0.5);
      }

      50% {
        opacity: 1;
        transform: scale(1.3);
      }
    }

    .hub {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 92px;
      height: 92px;
      transform: translate(-50%, -50%);
      border-radius: 50%;
      z-index: 5;
      pointer-events: none;
      background:
        radial-gradient(circle at 50% 72%, rgba(255,255,255,0.9), rgba(255,255,255,0) 24%),
        radial-gradient(circle at 35% 30%, #ff7676 0%, #f43636 38%, #bb1212 70%, #850707 100%);
      box-shadow:
        inset 0 5px 8px rgba(255,255,255,0.22),
        inset 0 -6px 8px rgba(0,0,0,0.18),
        0 6px 16px rgba(0,0,0,0.22);
      display: grid;
      place-items: center;
    }

    .hub::before {
      content: "★";
      color: #ffd54d;
      font-size: 42px;
      line-height: 1;
      text-shadow: 0 2px 0 rgba(0,0,0,0.12);
    }

    .controls {
      display: flex;
      flex-direction: column;
      gap: 14px;
      position: relative;
      z-index: 20;
    }

    .spin-btn {
      width: 300px;
      min-height: 96px;
      border: none;
      border-radius: 18px;
      padding: 14px 18px;
      color: white;
      cursor: pointer;
      box-shadow: 0 8px 18px rgba(0,0,0,0.14);
      transition: transform 0.15s ease, opacity 0.15s ease, box-shadow 0.15s ease;
      text-align: left;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 5px;
    }

    .spin-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(0,0,0,0.18);
    }

    .spin-btn:active {
      transform: translateY(0);
    }

    .spin-btn:disabled {
      opacity: 0.65;
      cursor: not-allowed;
    }

    .btn-title {
      font-size: 25px;
      font-weight: 800;
      line-height: 1;
    }

    .btn-explain {
      font-size: 15px;
      font-weight: 600;
      line-height: 1.2;
      opacity: 0.96;
    }

    .btn-green {
      background: #65c913;
    }

    .btn-blue {
      background: #4f6fe8;
    }

    .btn-orange {
      background: #f28a46;
    }

    @media (max-width: 860px) {
      .app {
        flex-direction: column;
      }

      .controls {
        flex-direction: column;
        align-items: center;
        width: 100%;
      }

      .spin-btn {
        width: min(92vw, 360px);
      }
    }
  </style>
</head>

<body>
  <div class="app">
    <div class="wheel-wrap">
      <div class="wheel-shell" id="wheelShell">
        <div class="wheel-rotator" id="wheelRotator">
          <img src="assets/rad.png" alt="Rad" />
        </div>

        <div class="sparkle-zone" aria-hidden="true">
          <div class="sparkle s1">✦</div>
          <div class="sparkle s2">✦</div>
          <div class="sparkle s3">✦</div>
          <div class="sparkle s4">✦</div>
          <div class="sparkle s5">✦</div>
          <div class="sparkle s6">✦</div>
          <div class="sparkle s7">✦</div>

          <div class="spark-dot d1"></div>
          <div class="spark-dot d2"></div>
          <div class="spark-dot d3"></div>
        </div>

        <div class="hub"></div>
      </div>
    </div>

    <div class="controls">
      <button class="spin-btn btn-green" data-target="green">
        <span class="btn-title">cijfer</span>
        <span class="btn-explain">een teken dat laat zien hoeveel het er zijn</span>
      </button>

      <button class="spin-btn btn-blue" data-target="blue">
        <span class="btn-title">letter</span>
        <span class="btn-explain">een teken waarmee je woorden kunt bouwen</span>
      </button>

      <button class="spin-btn btn-orange" data-target="orange">
        <span class="btn-title">woord</span>
        <span class="btn-explain">bestaat uit letters, een woord maakt een plaatje in je hoofd</span>
      </button>
    </div>
  </div>

  <script>
    const wheelShell = document.getElementById("wheelShell");
    const wheelRotator = document.getElementById("wheelRotator");
    const buttons = document.querySelectorAll(".spin-btn");

    let currentRotation = 0;
    let spinning = false;

    const targetAngles = {
      green: 0,
      orange: 120,
      blue: 240
    };

    function normalize(deg) {
      return ((deg % 360) + 360) % 360;
    }

    function setButtonsDisabled(disabled) {
      buttons.forEach(button => {
        button.disabled = disabled;
      });
    }

    function spinTo(targetColor) {
      if (spinning) return;

      spinning = true;
      setButtonsDisabled(true);
      wheelShell.classList.remove("stopped");

      const currentNormalized = normalize(currentRotation);
      const targetAngle = targetAngles[targetColor];
      const delta = normalize(targetAngle - currentNormalized);

      const extraTurns = (4 + Math.floor(Math.random() * 2)) * 360;
      const finalRotation = currentRotation + extraTurns + delta;

      wheelRotator.style.transform = `rotate(${finalRotation}deg)`;
      currentRotation = finalRotation;

      const finish = () => {
        spinning = false;
        setButtonsDisabled(false);
        wheelShell.classList.add("stopped");
      };

      wheelRotator.addEventListener("transitionend", finish, { once: true });
    }

    buttons.forEach(button => {
      button.addEventListener("click", () => {
        spinTo(button.dataset.target);
      });
    });

    window.addEventListener("load", () => {
      wheelShell.classList.add("stopped");
    });
  </script>
</body>
</html>
